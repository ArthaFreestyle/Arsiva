name: Deploy Go Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: self-hosted
    steps:
      - name: Tarik Kode Terbaru
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "Memulai proses build image..."
          docker compose build api-server

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Tarik Kode Terbaru
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          docker run --rm -v $(pwd):/app -w /app \
            -e CGO_ENABLED=1 \
            golang:1.25-alpine \
            sh -c "apk add --no-cache build-base gcc musl-dev && go test ./..."


  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Tarik Kode Terbaru
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Semua tes aman, memulai deployment..."
          docker compose up -d
          
          echo "Membersihkan image sampah..."
          docker image prune -f