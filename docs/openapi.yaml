      summary: Create quiz category
      description: "\U0001F512 **Role**: `guru`, `super_admin`\n"
      operationId: createQuizCategory
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCategoryRequest'
            example:
              nama_kategori: Pengetahuan Umum
              deskripsi: Kategori kuis untuk pengetahuan umum
      responses:
        '200':
          description: Kategori berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCategoryWrapper'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/categories/quiz/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: ID kategori kuis
    get:
      tags:
      - Quiz Categories
      summary: Get quiz category by ID
      description: "\U0001F512 **Role**: `member`, `guru`, `super_admin`\n"
      operationId: getQuizCategoryById
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Detail kategori
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCategoryWrapper'
    put:
      tags:
      - Quiz Categories
      summary: Update quiz category
      description: "\U0001F512 **Role**: `guru`, `super_admin`\n"
      operationId: updateQuizCategory
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCategoryRequest'
      responses:
        '200':
          description: Kategori berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCategoryWrapper'
    delete:
      tags:
      - Quiz Categories
      summary: Delete quiz category
      description: "\U0001F512 **Role**: `guru`, `super_admin`\n"
      operationId: deleteQuizCategory
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Kategori berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: Quiz Category Deleted
  /api/v1/articles:
    get:
      tags:
      - Articles
      summary: Get all articles
      description: "Mengambil semua artikel yang aktif (tanpa konten, untuk listing).\
        \  \n\U0001F512 **Role**: `member`, `guru`, `super_admin`\n"
      operationId: getAllArticles
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Nomor halaman
      - name: size
        in: query
        schema:
          type: integer
          default: 10
        description: Jumlah item per halaman
      - name: search
        in: query
        schema:
          type: string
        description: Pencarian berdasarkan judul artikel
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Daftar artikel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListWrapper'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Articles
      summary: Create article (draft)
      description: "Membuat artikel baru dengan status **draft**.  \nHanya memerlukan\
        \ `title`, `category_id`, dan `created_by`.  \nSlug otomatis di-generate dari\
        \ judul.  \n\U0001F512 **Role**: `guru`, `super_admin`\n"
      operationId: createArticle
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreateRequest'
            example:
              title: Sejarah Kerajaan Majapahit
              category_id: '1'
      responses:
        '200':
          description: Artikel draft berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleWrapper'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/articles/{slug}:
    parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      description: Slug artikel (unique)
      example: sejarah-kerajaan-majapahit-123456
    get:
      tags:
      - Articles
      summary: Get article by slug
      description: "Mengambil detail artikel lengkap beserta konten.  \n\U0001F512\
        \ **Role**: `member`, `guru`, `super_admin`\n"
      operationId: getArticleBySlug
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Detail artikel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleWrapper'
        '500':
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/articles/detail/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: ID artikel
    get:
      tags:
      - Articles
      summary: Get article by ID
      description: "Mengambil detail artikel lengkap berdasarkan ID (untuk halaman\
        \ edit).  \n\U0001F512 **Role**: `member`, `guru`, `super_admin`\n"
      operationId: getArticleById
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Detail artikel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleWrapper'
        '500':
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/articles/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: ID artikel
    put:
      tags:
      - Articles
      summary: Update article
      description: "Update artikel dengan konten lengkap dari Block-Based Editor (BSON).\
        \  \nSlug dan excerpt otomatis di-generate ulang.  \n\U0001F512 **Role**:\
        \ `guru`, `super_admin`\n"
      operationId: updateArticle
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleUpdateRequest'
            example:
              title: Sejarah Kerajaan Majapahit (Revisi)
              category_id: '1'
              status: published
              content: '{"blocks":[{"type":"paragraph","data":{"text":"Kerajaan Majapahit..."}}]}'
              thumbnail: /uploads/majapahit.jpg
      responses:
        '200':
          description: Artikel berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleWrapper'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Articles
      summary: Delete article (soft delete)
      description: "Mengubah `is_active` menjadi `false`.  \n\U0001F512 **Role**:\
        \ `guru`, `super_admin`\n"
      operationId: deleteArticle
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Artikel berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: Article Deleted
        '500':
          description: Gagal menghapus artikel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/upload/image:
    post:
      tags:
      - Upload
      summary: Upload gambar
      description: "Upload file gambar untuk digunakan di artikel (thumbnail atau\
        \ konten Block-Based Editor).  \n- Format yang didukung: **jpg, jpeg, png,\
        \ webp, gif**  \n- Ukuran maksimal: **5MB**  \n- File disimpan di `uploads/YYYY/MM/<uuid>.ext`\
        \  \n- URL yang dikembalikan bisa langsung diakses via `GET /uploads/...`\
        \  \n\U0001F512 **Role**: `guru`, `super_admin`\n"
      operationId: uploadImage
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - image
              properties:
