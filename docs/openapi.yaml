components:
  responses:
    UnauthorizedResponse:
      description: Token tidak valid, expired, atau tidak diberikan
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: invalid or expired token
    ForbiddenResponse:
      description: Role tidak memiliki izin untuk mengakses resource ini
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: 'forbidden: insufficient role'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Gunakan access token dari response login.  \nFormat: `Authorization:\
        \ Bearer <token>`  \nToken berisi claims: `user_id`, `email`, `username`,\
        \ `role`\n"
  schemas:
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          description: Email user terdaftar
          example: admin@example.com
        password:
          type: string
          format: password
          description: Password user
          example: rahasia123
    UserRequest:
      type: object
      required:
      - username
      - email
      - password
      - role
      properties:
        username:
          type: string
          description: Nama pengguna (unik)
          example: charlie
        email:
          type: string
          format: email
          description: Alamat email (unik)
          example: charlie@example.com
        password:
          type: string
          format: password
          description: Password (akan di-hash bcrypt)
          example: secret123
        role:
          type: string
          description: 'Role user: `member`, `guru`, atau `super_admin`'
          enum:
          - member
          - guru
          - super_admin
          example: guru
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID user
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - member
          - guru
          - super_admin
        created_at:
          type: string
