  # ── ARTICLES ─────────────────────────────────────────────
  /api/v1/articles:
    get:
      tags: [Articles]
      summary: Get all articles
      description: |
        Mengambil semua artikel yang aktif (tanpa konten, untuk listing).  
        🔒 **Role**: `member`, `guru`, `super_admin`
      operationId: getAllArticles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Nomor halaman
        - name: size
          in: query
          schema:
            type: integer
            default: 10
          description: Jumlah item per halaman
        - name: search
          in: query
          schema:
            type: string
          description: Pencarian berdasarkan judul artikel
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Daftar artikel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListWrapper"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Articles]
      summary: Create article (draft)
      description: |
        Membuat artikel baru dengan status **draft**.  
        Hanya memerlukan `title`, `category_id`, dan `created_by`.  
        Slug otomatis di-generate dari judul.  
        🔒 **Role**: `guru`, `super_admin`
      operationId: createArticle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleCreateRequest"
            example:
              title: Sejarah Kerajaan Majapahit
              category_id: "1"
      responses:
        "200":
          description: Artikel draft berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleWrapper"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/articles/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Slug artikel (unique)
        example: sejarah-kerajaan-majapahit-123456

    get:
      tags: [Articles]
      summary: Get article by slug
      description: |
        Mengambil detail artikel lengkap beserta konten.  
        🔒 **Role**: `member`, `guru`, `super_admin`
      operationId: getArticleBySlug
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detail artikel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleWrapper"
        "500":
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/articles/detail/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ID artikel

    get:
      tags: [Articles]
      summary: Get article by ID
      description: |
        Mengambil detail artikel lengkap berdasarkan ID (untuk halaman edit).  
        🔒 **Role**: `member`, `guru`, `super_admin`
      operationId: getArticleById
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detail artikel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleWrapper"
        "500":
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/articles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ID artikel

    put:
      tags: [Articles]
      summary: Update article
      description: |
        Update artikel dengan konten lengkap dari Block-Based Editor (BSON).  
        Slug dan excerpt otomatis di-generate ulang.  
        🔒 **Role**: `guru`, `super_admin`
      operationId: updateArticle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdateRequest"
            example:
              title: Sejarah Kerajaan Majapahit (Revisi)
              category_id: "1"
              status: published
              content: '{"blocks":[{"type":"paragraph","data":{"text":"Kerajaan Majapahit..."}}]}'
              thumbnail: /uploads/majapahit.jpg
      responses:
        "200":
          description: Artikel berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleWrapper"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Articles]
      summary: Delete article (soft delete)
      description: |
        Mengubah `is_active` menjadi `false`.  
        🔒 **Role**: `guru`, `super_admin`
      operationId: deleteArticle
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Artikel berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: "Article Deleted"
        "500":
          description: Gagal menghapus artikel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── UPLOAD ───────────────────────────────────────────────
  /api/v1/upload/image:
    post:
      tags: [Upload]
      summary: Upload gambar
      description: |
        Upload file gambar untuk digunakan di artikel (thumbnail atau konten Block-Based Editor).  
        - Format yang didukung: **jpg, jpeg, png, webp, gif**  
        - Ukuran maksimal: **5MB**  
        - File disimpan di `uploads/YYYY/MM/<uuid>.ext`  
        - URL yang dikembalikan bisa langsung diakses via `GET /uploads/...`  
        🔒 **Role**: `guru`, `super_admin`
      operationId: uploadImage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: File gambar (jpg/jpeg/png/webp/gif, max 5MB)
      responses:
        "200":
          description: Upload berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponseWrapper"
              example:
                data:
                  url: "/uploads/2026/03/a1b2c3d4-e5f6-7890-abcd-ef1234567890.jpg"
                  filename: "majapahit.jpg"
                  size: 204800
        "400":
          description: File tidak valid (format/ukuran salah)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Format file tidak didukung. Gunakan: jpg, jpeg, png, webp, gif"

