# ───────────────────── COMPONENTS ───────────────────────
components:
  # ── Reusable Responses ──
  responses:
    UnauthorizedResponse:
      description: Token tidak valid, expired, atau tidak diberikan
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: "invalid or expired token"
    ForbiddenResponse:
      description: Role tidak memiliki izin untuk mengakses resource ini
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: "forbidden: insufficient role"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Gunakan access token dari response login.  
        Format: `Authorization: Bearer <token>`  
        Token berisi claims: `user_id`, `email`, `username`, `role`

  schemas:
    # ── Request Schemas ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email user terdaftar
          example: admin@example.com
        password:
          type: string
          format: password
          description: Password user
          example: rahasia123

    UserRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
          description: Nama pengguna (unik)
          example: charlie
        email:
          type: string
          format: email
          description: Alamat email (unik)
          example: charlie@example.com
        password:
          type: string
          format: password
          description: Password (akan di-hash bcrypt)
          example: secret123
        role:
          type: string
          description: "Role user: `member`, `guru`, atau `super_admin`"
          enum: [member, guru, super_admin]
          example: guru

    # ── Response Schemas ──
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID user
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [member, guru, super_admin]
        created_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        access_token:
          type: string
          description: JWT access token (expired 60 menit)
        refresh_token:
          type: string
          description: JWT refresh token (expired 7 hari)

    # ── Wrapper Schemas (WebResponse<T>) ──
    UserResponseWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/UserResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string

    UserListResponseWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string

    LoginResponseWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LoginResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string

    PageMetaData:
      type: object
      nullable: true
      properties:
        page:
          type: integer
        size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Pesan error

    # ── Article Category Schemas ──
    ArticleCategoryRequest:
      type: object
      required: [nama_kategori]
      properties:
        nama_kategori:
          type: string
          description: Nama kategori artikel
          example: Sejarah

    ArticleCategoryResponse:
      type: object
      properties:
        article_category_id:
          type: string
        nama_kategori:
          type: string

    ArticleCategoryWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ArticleCategoryResponse"

    ArticleCategoryListWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArticleCategoryResponse"

    # ── Story Category Schemas ──
    StoryCategoryRequest:
      type: object
      required: [nama_kategori]
      properties:
        nama_kategori:
          type: string
          description: Nama kategori cerita
          example: Fantasi

    StoryCategoryResponse:
      type: object
      properties:
        story_category_id:
          type: string
          description: ID kategori cerita
        nama_kategori:
          type: string
          description: Nama kategori cerita

    StoryCategoryWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/StoryCategoryResponse"

    StoryCategoryListWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/StoryCategoryResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"

    # ── Quiz Category Schemas ──
    QuizCategoryRequest:
      type: object
      required: [nama_kategori]
      properties:
        nama_kategori:
          type: string
          description: Nama kategori kuis
          example: Pengetahuan Umum
        deskripsi:
          type: string
          description: Deskripsi kategori kuis (opsional)
          example: Kategori kuis untuk pengetahuan umum

    QuizCategoryResponse:
      type: object
      properties:
        quiz_category_id:
          type: string
          description: ID kategori kuis
        nama_kategori:
          type: string
          description: Nama kategori kuis
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
        deskripsi:
          type: string

    QuizCategoryWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/QuizCategoryResponse"

    QuizCategoryListWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/QuizCategoryResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"

    # ── Article Schemas ──
    ArticleCreateRequest:
      type: object
      required: [title, category_id]
      properties:
        title:
          type: string
          description: Judul artikel
          example: Sejarah Kerajaan Majapahit
        category_id:
          type: string
          description: ID kategori artikel
          example: "1"

    ArticleUpdateRequest:
      type: object
      required: [title, category_id, status, content]
      properties:
        title:
          type: string
          description: Judul artikel
        category_id:
          type: string
          description: ID kategori artikel
        status:
          type: string
          description: Status publikasi
          enum: [draft, published]
        content:
          type: string
          description: Konten BSON dari Block-Based Editor
        thumbnail:
          type: string
          description: Path thumbnail (opsional)

    ArticleResponse:
      type: object
      properties:
        article_id:
          type: string
        slug:
          type: string
          description: Auto-generated dari judul
        title:
          type: string
        content:
          type: string
          description: Konten BSON (hanya muncul pada detail)
        category:
          $ref: "#/components/schemas/ArticleCategoryResponse"
        status:
          type: string
          enum: [draft, published]
        excerpt:
          type: string
          description: Auto-generated dari konten (max 150 chars)
        created_by:
          $ref: "#/components/schemas/UserResponse"
        created_at:
          type: string
          format: date-time
        thumbnail:
          type: string

    ArticleWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ArticleResponse"

    ArticleListWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArticleResponse"

    # ── Upload Schemas ──
    UploadResponse:
      type: object
      properties:
        url:
          type: string
          description: URL akses gambar (relative path)
          example: "/uploads/2026/03/uuid.jpg"
        filename:
          type: string
          description: Nama file asli
          example: "majapahit.jpg"
        size:
          type: integer
          description: Ukuran file dalam bytes
          example: 204800

    UploadResponseWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/UploadResponse"

    # ── Puzzle Schemas ──
    PuzzleRequest:
      type: object
      required: [judul, gambar, thumbnail, kategori, xp_reward, is_published]
      properties:
        judul:
          type: string
        gambar:
          type: string
        thumbnail:
          type: string
        kategori:
          type: string
        xp_reward:
          type: integer
        is_published:
          type: boolean

    PuzzleResponse:
      type: object
      properties:
        puzzle_id:
          type: string
        judul:
          type: string
        gambar:
          type: string
        thumbnail:
          type: string
        kategori:
          type: string
        xp_reward:
          type: integer
        user:
          $ref: "#/components/schemas/UserResponse"
        created_at:
          type: string
          format: date-time
        is_published:
          type: boolean

    PuzzleWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PuzzleResponse"

    PuzzleListWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PuzzleResponse"

    # ── Quiz Schemas ──
    OptionRequest:
      type: object
      required: [teks_jawaban, is_correct, score]
      properties:
        teks_jawaban:
          type: string
          example: "Jakarta"
        is_correct:
          type: boolean
          example: true
        score:
          type: integer
          example: 10

    QuestionRequest:
      type: object
      required: [teks_pertanyaan, tipe, poin, pertanyaan_gambar, pilihan]
      properties:
        urutan:
          type: integer
          example: 1
        teks_pertanyaan:
          type: string
          example: "Apa ibukota Indonesia?"
        tipe:
          type: string
