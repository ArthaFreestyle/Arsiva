              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/categories/article/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ID kategori artikel

    get:
      tags: [Article Categories]
      summary: Get article category by ID
      description: |
        🔒 **Role**: `member`, `guru`, `super_admin`
      operationId: getArticleCategoryById
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detail kategori
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleCategoryWrapper"

    put:
      tags: [Article Categories]
      summary: Update article category
