      description: "Melengkapi / mengupdate profil member milik sendiri. Field `total_xp`, `level`, dan `last_active` tidak dapat diubah melalui endpoint ini.\n\n🔒 **Role**: `member`\n"
      operationId: updateMemberMe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdateProfileRequest"
            example:
              sekolah_id: "1"
              nis: "2024001"
              foto_profil: /uploads/2026/03/foto.jpg
              bio: Siswa kelas 9 yang suka sains.
              tanggal_lahir: "2010-05-15"
              jenis_kelamin: L
              minat: Matematika, IPA
      responses:
        "200":
          description: Profil member berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWrapper"
        "400":
          description: "Validasi gagal — termasuk nilai `jenis_kelamin` di luar `L`, `P`, `Lainnya`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          description: Member tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/member/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID member (SERIAL)
        example: 1
    get:
      tags:
        - Member
      summary: Get member by ID
      description: "Mengambil detail member beserta sekolah. Member hanya bisa mengakses profil miliknya sendiri.\n\n🔒 **Role**: `super_admin`, `member` (hanya milik sendiri)\n"
      operationId: getMemberById
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detail member beserta sekolah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetailWrapper"
              example:
                data:
                  member_id: "1"
                  nis: "2024001"
                  total_xp: 150
                  level: 2
                  foto_profil: /uploads/2026/03/foto.jpg
                  bio: Siswa kelas 9 yang suka sains.
                  tanggal_lahir: "2010-05-15"
                  jenis_kelamin: L
                  minat: Matematika, IPA
                  username: andi_siswa
                  email: andi@example.com
                  sekolah:
                    sekolah_id: "1"
                    nama_sekolah: SMP Negeri 1 Jakarta
                    alamat_sekolah: Jl. Merdeka No. 1
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          description: Member tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Member
      summary: Update member by ID
      description: "Mengupdate profil member. Member hanya bisa mengupdate profil miliknya sendiri. Field `total_xp`, `level`, dan `last_active` tidak dapat diubah melalui endpoint ini.\n\n🔒 **Role**: `super_admin`, `member` (hanya milik sendiri)\n"
      operationId: updateMember
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdateProfileRequest"
            example:
              sekolah_id: "2"
              nis: "2024002"
              bio: Siswa pindahan kelas 9.
              jenis_kelamin: P
      responses:
        "200":
          description: Member berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWrapper"
        "400":
          description: "Validasi gagal — termasuk nilai `jenis_kelamin` di luar `L`, `P`, `Lainnya`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          description: Member tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Gagal update ke database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Member
      summary: Delete member
      description: "Menghapus data member dari database.\n\n🔒 **Role**: `super_admin`\n"
      operationId: deleteMember
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Member berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: Member deleted successfully
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          description: Member tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  responses:
    UnauthorizedResponse:
      description: Token tidak valid, expired, atau tidak diberikan
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: invalid or expired token
    ForbiddenResponse:
      description: Role tidak memiliki izin untuk mengakses resource ini
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
                example: "forbidden: insufficient role"
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Gunakan access token dari response login. \

        Format: `Authorization: Bearer <token>` \

        Token berisi claims: `user_id`, `email`, `username`, `role`, `details` (role-specific: `GuruDetails` untuk guru, `MemberDetails` untuk member, `null` untuk super_admin)\n"
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email user terdaftar
          example: admin@example.com
        password:
          type: string
          format: password
          description: Password user
          example: rahasia123
    UserRequest:
      type: object
      required:
        - username
        - email
        - password
        - role
      properties:
        username:
          type: string
          description: Nama pengguna (unik)
          example: charlie
        email:
          type: string
          format: email
          description: Alamat email (unik)
          example: charlie@example.com
        password:
          type: string
          format: password
          description: Password (akan di-hash bcrypt)
          example: secret123
        role:
          type: string
          description: "Role user: `member`, `guru`, atau `super_admin`"
          enum:
            - member
            - guru
            - super_admin
          example: guru
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID user
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - member
            - guru
            - super_admin
        created_at:
          type: string
          format: date-time
    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        access_token:
          type: string
          description: JWT access token (expired 60 menit)
        refresh_token:
          type: string
          description: JWT refresh token (expired 7 hari)
    UserResponseWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/UserResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string
    UserListResponseWrapper:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string
    LoginResponseWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LoginResponse"
        paging:
          $ref: "#/components/schemas/PageMetaData"
        errors:
          type: string
    PageMetaData:
      type: object
      nullable: true
      properties:
        page:
          type: integer
